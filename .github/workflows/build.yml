name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "keymap-drawer/**"

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }} - ${{ github.event.head_commit.message || 'Manually triggered' }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            **Commit:** ${{ github.event.head_commit.message }}
            **SHA:** `${{ github.sha }}`
            **Author:** ${{ github.event.head_commit.author.name }}

            Flash each `.uf2` file to its corresponding device.
            See [docs/dongle-usage.md](https://github.com/${{ github.repository }}/blob/main/docs/dongle-usage.md) for flashing instructions.

            [View keymap diagram](https://github.com/${{ github.repository }}/tree/main/keymap-drawer)
          files: firmware/*.uf2
